<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="d-flex justify-content-between">

<h2>Tasks</h2>

<a href="/tasks/add/"
class="btn btn-primary">

Add Task

</a>

</div>

<hr>

<table class="table table-bordered">

<thead>

<tr>

<th>Title</th>
<th>Priority</th>
<th>Status</th>
<th>Due Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for task in tasks %}

<tr>

<td>{{ task.title }}</td>

<td>{{ task.priority }}</td>

<td>{{ task.status }}</td>

<td>{{ task.due_date }}</td>

<td>

<a
href="/tasks/edit/{{task.id}}/"
class="btn btn-warning btn-sm">

Edit

</a>

<a
href="/tasks/delete/{{task.id}}/"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
