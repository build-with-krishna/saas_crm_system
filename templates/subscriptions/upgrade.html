<!DOCTYPE html>
<html>
<head>

<title>Upgrade Plan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>

Available Plans

</h2>

<hr>

{% for i in plans %}

<div class="card mb-3">

<div class="card-body">

<h4>

{{ i.plan.name }}

</h4>

<p>

</p>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
