<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>

Companies

</h2>

<hr>

<table class="table table-bordered">

<tr>

<th>Name</th>

<th>Email</th>

<th>Status</th>

<th>Action</th>

</tr>

{% for company in companies %}

<tr>

<td>

{{ company.name }}

</td>

<td>

{{ company.email }}

</td>

<td>

{% if company.is_active %}

<span class="badge bg-success">

Active

</span>

{% else %}

<span class="badge bg-danger">

Suspended

</span>

{% endif %}

</td>

<td>

{% if company.is_active %}

<a
href="/superadmin/company/suspend/{{company.id}}/"
class="btn btn-danger btn-sm">

Suspend

</a>

{% else %}

<a
href="/superadmin/company/activate/{{company.id}}/"
class="btn btn-success btn-sm">

Activate

</a>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
