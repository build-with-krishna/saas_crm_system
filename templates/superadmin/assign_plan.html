<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header">

Assign Plan

</div>

<div class="card-body">

<h4>

{{ company.name }}

</h4>

<form method="post">

{% csrf_token %}

<select
name="plan"
class="form-control">

{% for i in plans %}

<option value="{{i.id}}">

{{ i.name }}
₹ {{ i.price }}

</option>

{% endfor %}

</select>

<br>

<button class="btn btn-success">

Assign Plan

</button>

</form>

</div>

</div>

</div>

</body>
</html>
