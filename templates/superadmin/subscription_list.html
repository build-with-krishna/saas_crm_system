<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>

Subscriptions

</h2>

<hr>

<table class="table table-bordered">

<tr>

<th>Company</th>
<th>Plan</th>
<th>Status</th>
<th>End Date</th>

</tr>

{% for i in subscriptions %}

<tr>

<td>

{{ i.company }}

</td>

<td>

{{ i.plan }}

</td>

<td>

{{ i.status }}

</td>

<td>

{{ i.end_date }}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
