<!DOCTYPE html>
<html>
<head>

<title>Customer Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">

<h3>

Customer Details

</h3>

</div>

<div class="card-body">

<p>
<b>Name :</b>
{{ customer.name }}
</p>

<p>
<b>Phone :</b>
{{ customer.phone }}
</p>

<p>
<b>Email :</b>
{{ customer.email }}
</p>

<p>
<b>GST Number :</b>
{{ customer.gst_number }}
</p>

<p>
<b>Type :</b>
{{ customer.customer_type }}
</p>

<p>
<b>Outstanding Balance :</b>
₹ {{ customer.outstanding_balance }}
</p>

<p>
<b>Address :</b>
{{ customer.address }}
</p>

<a href="/customers/"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</body>
</html>
