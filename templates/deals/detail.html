<!DOCTYPE html>
<html>
<head>

<title>Deal Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">

<h3>

Deal Details

</h3>

</div>

<div class="card-body">

<p>
<b>Title :</b>
{{ deal.title }}
</p>

<p>
<b>Customer :</b>
{{ deal.customer }}
</p>

<p>
<b>Amount :</b>
₹ {{ deal.amount }}
</p>

<p>
<b>Stage :</b>
{{ deal.stage }}
</p>

<p>
<b>Expected Close Date :</b>
{{ deal.expected_close_date }}
</p>

<p>
<b>Assigned To :</b>
{{ deal.assigned_to }}
</p>

<p>
<b>Notes :</b>
{{ deal.notes }}
</p>

<a href="/deals/"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</body>
</html>
